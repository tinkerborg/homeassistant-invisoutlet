name: cicd

# One pipeline: on every push/PR run lint, tests, and HACS + hassfest
# validation; on a push to the default branch, if all of those pass AND the
# manifest version has no tag yet, cut a GitHub release (which is what HACS
# installs). No paths filter — the release job runs on every default-branch
# push but no-ops unless the version is new, so a follow-up fix commit still
# triggers the release once CI goes green.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uvx ruff check custom_components tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
      - run: uv run --locked --group test pytest --cov-report=xml
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration

  release:
    needs: [lint, test, hassfest, hacs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history so release notes can diff against the last tag
      - name: Read version from manifest.json
        id: ver
        run: |
          version=$(python -c "import json; print(json.load(open('custom_components/invisoutlet/manifest.json'))['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create release if the tag doesn't exist yet
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.ver.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
